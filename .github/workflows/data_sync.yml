name: Παραστατικά & Τιμολογήσεις

on:
  schedule:
    # Κάθε 2 ώρες. Τα email έρχονται όλη μέρα, δεν έχουν σταθερή ώρα.
    - cron: '0 */2 * * *'
  workflow_dispatch:

concurrency:
  group: data-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Εγκατάσταση
        run: pip install -r requirements.txt

      - name: Συγχρονισμός
        env:
          GOOGLE_KEY_JSON: ${{ secrets.GOOGLE_KEY_JSON }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
        run: python jobs/data_sync.py
