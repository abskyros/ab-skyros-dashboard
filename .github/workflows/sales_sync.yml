name: Nightly Sales Sync

on:
  schedule:
    # Στόχος: αυτόματη ενημέρωση πωλήσεων στις 22:00 ΚΑΙ 23:00 ώρα Ελλάδας.
    # Χειμώνας (UTC+2): 22:00→20 UTC, 23:00→21 UTC
    # Καλοκαίρι (UTC+3): 22:00→19 UTC, 23:00→20 UTC
    # Τα 19/20/21 UTC καλύπτουν 22:00 & 23:00 και στις δύο εποχές (DST).
    # Το script είναι idempotent — προσθέτει μόνο ό,τι λείπει, οπότε τυχόν διπλή εκτέλεση δεν πειράζει.
    - cron: '0 19 * * *'
    - cron: '0 20 * * *'
    - cron: '0 21 * * *'
  workflow_dispatch:

jobs:
  sync-sales:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system deps (Tesseract + Poppler + Greek)
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr tesseract-ocr-ell poppler-utils

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install gspread google-auth imap-tools pdf2image pytesseract pillow

      - name: Run sales sync
        env:
          GOOGLE_KEY_JSON: ${{ secrets.GOOGLE_KEY_JSON }}
          SALES_EMAIL_PASS: ${{ secrets.SALES_EMAIL_PASS }}
        run: python sales_sync.py
