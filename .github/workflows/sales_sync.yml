name: Nightly Sales Sync

on:
  schedule:
    # Στόχος: αυτόματη ενημέρωση πωλήσεων ΚΑΘΕ ΜΙΣΗ ΩΡΑ από 21:30 έως 02:00 ώρα Ελλάδας.
    # (21:30, 22:00, 22:30, 23:00, 23:30, 00:00, 00:30, 01:00, 01:30, 02:00)
    # Οι πωλήσεις μπορεί να ανέβουν στο σύστημα οποιαδήποτε ώρα μέσα σε αυτό το διάστημα.
    # Το script είναι idempotent: μόλις βρει & καταχωρήσει τη μέρα, οι επόμενες εκτελέσεις δεν κάνουν τίποτα.
    # Καλύπτουμε χειμώνα (UTC+2) ΚΑΙ καλοκαίρι (UTC+3) μαζί.
    - cron: '0 0,19,20,21,22,23 * * *'      # λεπτό :00
    - cron: '30 18,19,20,21,22,23 * * *'    # λεπτό :30
  workflow_dispatch:

jobs:
  sync-sales:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system deps (Tesseract + Poppler + Greek)
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr tesseract-ocr-ell poppler-utils

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install "gspread>=6.0.0" "google-auth>=2.0.0" imap-tools pdf2image pytesseract pillow

      - name: Run sales sync
        env:
          GOOGLE_KEY_JSON: ${{ secrets.GOOGLE_KEY_JSON }}
          SALES_EMAIL_PASS: ${{ secrets.SALES_EMAIL_PASS }}
        run: python sales_sync.py
