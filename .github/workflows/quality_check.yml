name: Daily Quality Check

on:
  schedule:
    # 10:00 ώρα Ελλάδας — χειμώνας UTC+2 → 08:00 UTC, καλοκαίρι UTC+3 → 07:00 UTC
    - cron: '0 8 * * *'   # χειμερινή ώρα → 10:00
    - cron: '0 7 * * *'   # θερινή ώρα → 10:00
  workflow_dispatch:

jobs:
  quality-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install gspread google-auth

      - name: Run quality check
        env:
          GOOGLE_KEY_JSON: ${{ secrets.GOOGLE_KEY_JSON }}
        run: python quality_check.py
