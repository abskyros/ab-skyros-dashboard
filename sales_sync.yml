name: Nightly Sales Sync

on:
  schedule:
    # 21:00 UTC = 23:00 ώρα Ελλάδας (θερινή ώρα EEST, UTC+2... προσοχή: το cron είναι σε UTC)
    # Χειμώνας Ελλάδα = UTC+2 → 21:00 UTC = 23:00. Καλοκαίρι = UTC+3 → 20:00 UTC = 23:00.
    # Βάζουμε δύο ώρες ώστε να καλύπτονται και οι δύο· το script είναι idempotent (skip διπλών).
    - cron: '0 21 * * *'   # χειμερινή ώρα Ελλάδας → 23:00
    - cron: '0 20 * * *'   # θερινή ώρα Ελλάδας → 23:00
  workflow_dispatch:        # χειροκίνητη εκτέλεση από το tab Actions

jobs:
  sync-sales:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system deps (Tesseract + Poppler + Greek)
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr tesseract-ocr-ell poppler-utils

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install gspread google-auth pandas openpyxl imap-tools pdf2image pytesseract

      - name: Run sales sync
        env:
          GOOGLE_KEY_JSON: ${{ secrets.GOOGLE_KEY_JSON }}
          SALES_EMAIL_PASS: ${{ secrets.SALES_EMAIL_PASS }}
        run: python sales_sync.py
